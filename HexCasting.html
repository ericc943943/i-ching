<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>易經卜卦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EEE3; --surface:#FBF8F1; --ink:#33291F; --sub:#6b6255;
    --accent:#7A5230; --gold:#B98455; --jade:#4B5C46; --line:rgba(51,41,31,.15);
    --dot:#059669;
    --font-head:'Noto Serif TC',serif; --font-body:'Noto Serif TC',serif; --font-label:'Noto Sans TC',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);
    display:flex;justify-content:center;padding:48px 20px;}
  .page{width:100%;max-width:560px;}
  .eyebrow{font-family:var(--font-label);font-size:12px;letter-spacing:.25em;color:var(--gold);
    text-align:center;text-transform:uppercase;margin-bottom:6px;}
  h1{font-family:var(--font-head);font-weight:700;font-size:30px;text-align:center;margin:0 0 40px;letter-spacing:.04em;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:32px;margin-bottom:24px;}
  .coins{display:flex;justify-content:center;gap:16px;margin-bottom:22px;height:44px;}
  .coin{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-head);
    font-size:15px;color:var(--gold);transition:transform .25s, background .2s, color .2s, border-color .2s;}
  .coin.yang{background:var(--surface);color:var(--gold);border-color:var(--gold);}
  .coin.yin{background:var(--gold);color:var(--surface);border-color:var(--gold);}
  .coin.flip{animation:flip .5s ease;}
  @keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(180deg)}100%{transform:rotateY(360deg)}}
  .cast-btn{display:block;margin:0 auto 8px;font-family:var(--font-label);font-size:13px;
    letter-spacing:.1em;padding:10px 28px;border-radius:999px;border:1px solid var(--ink);
    background:transparent;color:var(--ink);cursor:pointer;}
  .cast-btn:disabled{opacity:.4;cursor:default;}
  .confirm-row{display:none;text-align:center;}
  .confirm-text{display:block;font-family:var(--font-label);font-size:13px;color:var(--sub);
    margin-bottom:14px;line-height:1.7;}
  .confirm-actions{display:flex;justify-content:center;gap:10px;}
  .confirm-actions button{font-family:var(--font-label);font-size:13px;letter-spacing:.05em;
    padding:9px 22px;border-radius:999px;cursor:pointer;}
  #confirmYes{background:var(--ink);color:var(--surface);border:1px solid var(--ink);}
  #confirmNo{background:transparent;color:var(--sub);border:1px solid var(--line);}
  .cast-hint{text-align:center;font-size:14px;color:var(--sub);font-family:var(--font-label);margin:8px 0 20px;line-height:1.9;white-space:pre-line;}
  .progress{text-align:center;font-family:var(--font-label);font-size:12px;color:var(--jade);
    min-height:16px;margin-top:10px;}
  .result{display:none;}
  .result.show{display:block;}
  .hexrow{display:flex;align-items:center;gap:16px;margin-bottom:10px;}
  .hexrow:last-child{margin-bottom:0;}
  .hexrow.pop{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scaleY(.4);opacity:.2}60%{transform:scaleY(1.08)}100%{transform:scaleY(1);opacity:1}}
  .yao{flex:1;height:10px;display:flex;gap:8px;}
  .bar{flex:1;height:100%;background:var(--ink);border-radius:2px;}
  .label{font-family:var(--font-label);font-size:12px;color:var(--sub);width:32px;flex-shrink:0;}
  .moving{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .no-move{width:8px;flex-shrink:0;}
  .names{display:flex;justify-content:space-between;align-items:baseline;margin:26px 0 4px;flex-wrap:wrap;gap:8px;}
  .gua-name{font-family:var(--font-head);font-weight:700;font-size:22px;}
  .gua-num{font-family:var(--font-label);font-weight:400;font-size:11px;color:var(--sub);letter-spacing:.1em;margin-right:6px;}
  .arrow{color:var(--sub);font-size:13px;font-family:var(--font-label);}
  .zhi-name{font-family:var(--font-head);font-weight:700;font-size:17px;color:var(--sub);}
  .gua-ci{font-size:15px;line-height:1.9;margin:12px 0 0;}
  .zhi-gua-ci{color:var(--sub);margin-top:10px;}
  .zhi-label{display:block;font-family:var(--font-label);font-size:11px;letter-spacing:.1em;
    color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
  .hex-compare{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:26px 0 0;}
  .hex-compare::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;
    background:var(--line);transform:translateX(-0.5px);}
  .hex-arrow{position:absolute;left:50%;top:11px;transform:translateX(-50%);
    background:var(--surface);padding:2px 8px;font-family:var(--font-label);font-size:12px;
    color:var(--sub);white-space:nowrap;z-index:1;}
  .hex-col .col-num-name{text-align:center;margin-bottom:6px;}
  .hex-col .col-gua-num{display:block;font-family:var(--font-label);font-size:11px;
    color:var(--sub);letter-spacing:.1em;margin-bottom:2px;}
  .hex-col .col-gua-name{font-family:var(--font-head);font-weight:700;font-size:18px;}
  .hex-col .col-label{text-align:center;font-family:var(--font-label);font-size:11px;letter-spacing:.15em;
    color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
  .hex-col .col-gua-ci{font-size:13px;line-height:1.8;text-align:center;color:var(--ink);}
  .zhi-col .col-gua-name{color:var(--sub);}
  .section-title{font-family:var(--font-label);font-size:11px;letter-spacing:.15em;color:var(--gold);
    text-transform:uppercase;margin:26px 0 10px;text-align:center;}
  .yao-ci-item{font-size:14px;line-height:1.9;margin-bottom:8px;}
  .yao-ci-item b{font-family:var(--font-head);font-weight:700;color:var(--accent);margin-right:6px;}
  .yao-ci-item.moving-line{background:rgba(185,132,85,.14);border-radius:4px;padding:8px 10px;margin:0 -10px 8px;}
  .no-change{font-family:var(--font-label);font-size:13px;color:var(--sub);margin-top:26px;text-align:center;}
  .hex-single{margin:26px 0 0;text-align:center;}
  .hex-single .col-num-name{margin-bottom:6px;}
  .hex-single .col-gua-num{display:block;font-family:var(--font-label);font-size:11px;
    color:var(--sub);letter-spacing:.1em;margin-bottom:2px;}
  .hex-single .col-gua-name{font-family:var(--font-head);font-weight:700;font-size:18px;}
  .gua-ci-centered{font-size:15px;line-height:1.9;margin:10px 0 0;text-align:center;}
  .history-title{font-family:var(--font-label);font-size:12px;letter-spacing:.15em;color:var(--sub);
    text-transform:uppercase;margin-bottom:14px;}
  .hist-item{display:flex;justify-content:space-between;font-size:13px;padding:10px 0;
    border-top:1px solid var(--line);color:var(--sub);}
  .hist-item:first-child{border-top:none;}
  .hist-item span:last-child{color:var(--ink);}
  .empty{font-family:var(--font-label);font-size:13px;color:var(--sub);text-align:center;padding:8px 0;}
  .intro-overlay{position:fixed;inset:0;background:var(--dot);opacity:.8;z-index:9999;pointer-events:none;
    animation:introShrink 4.5s cubic-bezier(.65,.05,.2,1) forwards;}
  @keyframes introShrink{
    0%{ clip-path:circle(150vmax at var(--cx,50%) var(--cy,50%)); }
    100%{ clip-path:circle(7px at var(--cx,50%) var(--cy,50%)); }
  }
  .prompt-card{text-align:center;padding-top:22px;padding-bottom:22px;}
  .breathe-dot{width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle, var(--dot) 0%, var(--dot) 22%, transparent 68%);
    margin:0 auto 18px;animation:breathe 6s ease-in-out infinite;}
  @keyframes breathe{
    0%,100%{transform:scale(1);opacity:.55;}
    50%{transform:scale(1.75);opacity:1;}
  }
  .breathe-hint{font-family:var(--font-label);font-size:11px;letter-spacing:.1em;color:var(--sub);
    text-align:center;margin:0 0 20px;}
  #question{width:100%;min-height:56px;resize:vertical;background:transparent;
    border:1px solid var(--line);border-radius:4px;padding:12px 14px;margin-bottom:0;
    font-family:var(--font-label);font-size:13px;color:var(--ink);line-height:1.7;text-align:center;}
  #question:focus{outline:none;border-color:var(--gold);}
  #question::placeholder{color:var(--sub);text-align:center;}
  #question::-webkit-input-placeholder{color:var(--sub);text-align:center;}
  #question::-moz-placeholder{color:var(--sub);text-align:center;opacity:1;}
  .asked{font-family:var(--font-label);font-size:12px;color:var(--sub);margin:0 0 4px;}
</style>
</head>
<body>
<div class="intro-overlay" id="introOverlay"></div>
<div class="page">
  <div class="eyebrow">起卦、觀卦、品卦</div>
  <h1>易經卜卦</h1>

  <div class="card prompt-card" id="inputCard">
    <div class="breathe-dot"></div>
    <p class="breathe-hint">跟著圓點的節奏，慢慢吸氣、吐氣</p>
    <textarea id="question" placeholder="（選填）寫下你想問的事，起卦後會一併記錄"></textarea>

  <div class="card" id="hexCard">

<script>
const TRIGRAMS = {
  '乾':[1,1,1], '兌':[1,1,0], '離':[1,0,1], '震':[1,0,0],
  '巽':[0,1,1], '坎':[0,1,0], '艮':[0,0,1], '坤':[0,0,0]
};

const RAW = [
[1,'乾為天','乾','乾','元亨利貞。',
 ['潛龍勿用。','見龍在田，利見大人。','君子終日乾乾，夕惕若厲，无咎。','或躍在淵，无咎。','飛龍在天，利見大人。','亢龍有悔。'],'見群龍无首，吉。'],
[2,'坤為地','坤','坤','元亨，利牝馬之貞。君子有攸往，先迷後得主，利。西南得朋，東北喪朋。安貞吉。',
 ['履霜，堅冰至。','直方大，不習无不利。','含章可貞。或從王事，无成有終。','括囊，无咎无譽。','黃裳，元吉。','龍戰于野，其血玄黃。'],'利永貞。'],
[3,'水雷屯','坎','震','元亨利貞，勿用有攸往，利建侯。',
 ['磐桓，利居貞，利建侯。','屯如邅如，乘馬班如，匪寇婚媾，女子貞不字，十年乃字。','即鹿无虞，惟入于林中，君子幾不如舍，往吝。','乘馬班如，求婚媾，往吉，无不利。','屯其膏，小貞吉，大貞凶。','乘馬班如，泣血漣如。']],
[4,'山水蒙','艮','坎','亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。',
 ['發蒙，利用刑人，用說桎梏，以往吝。','包蒙吉，納婦吉，子克家。','勿用取女，見金夫，不有躬，无攸利。','困蒙，吝。','童蒙，吉。','擊蒙，不利為寇，利禦寇。']],
[5,'水天需','坎','乾','有孚，光亨，貞吉，利涉大川。',
 ['需于郊，利用恆，无咎。','需于沙，小有言，終吉。','需于泥，致寇至。','需于血，出自穴。','需于酒食，貞吉。','入于穴，有不速之客三人來，敬之終吉。']],
[6,'天水訟','乾','坎','有孚，窒惕，中吉，終凶。利見大人，不利涉大川。',
 ['不永所事，小有言，終吉。','不克訟，歸而逋，其邑人三百戶，无眚。','食舊德，貞厲，終吉。或從王事，无成。','不克訟，復即命渝，安貞吉。','訟，元吉。','或錫之鞶帶，終朝三褫之。']],
[7,'地水師','坤','坎','貞，丈人吉，无咎。',
 ['師出以律，否臧凶。','在師中，吉无咎，王三錫命。','師或輿尸，凶。','師左次，无咎。','田有禽，利執言，无咎。長子帥師，弟子輿尸，貞凶。','大君有命，開國承家，小人勿用。']],
[8,'水地比','坎','坤','吉。原筮元永貞，无咎。不寧方來，後夫凶。',
 ['有孚比之，无咎。有孚盈缶，終來有它，吉。','比之自內，貞吉。','比之匪人。','外比之，貞吉。','顯比，王用三驅，失前禽，邑人不誡，吉。','比之无首，凶。']],
[9,'風天小畜','巽','乾','亨。密雲不雨，自我西郊。',
 ['復自道，何其咎，吉。','牽復，吉。','輿說輻，夫妻反目。','有孚，血去惕出，无咎。','有孚攣如，富以其鄰。','既雨既處，尚德載，婦貞厲。月幾望，君子征凶。']],
[10,'天澤履','乾','兌','履虎尾，不咥人，亨。',
 ['素履，往无咎。','履道坦坦，幽人貞吉。','眇能視，跛能履，履虎尾，咥人，凶。武人為于大君。','履虎尾，愬愬，終吉。','夬履，貞厲。','視履考祥，其旋元吉。']],
[11,'地天泰','坤','乾','小往大來，吉亨。',
 ['拔茅茹，以其彙，征吉。','包荒，用馮河，不遐遺，朋亡，得尚于中行。','无平不陂，无往不復，艱貞无咎。勿恤其孚，于食有福。','翩翩，不富以其鄰，不戒以孚。','帝乙歸妹，以祉元吉。','城復于隍，勿用師，自邑告命，貞吝。']],
[12,'天地否','乾','坤','否之匪人，不利君子貞，大往小來。',

[13,'天火同人','乾','離','同人于野，亨。利涉大川，利君子貞。',

[14,'火天大有','離','乾','元亨。',
 ['无交害，匪咎，艱則无咎。','大車以載，有攸往，无咎。','公用亨于天子，小人弗克。','匪其彭，无咎。','厥孚交如，威如，吉。','自天祐之，吉无不利。']],
[15,'地山謙','坤','艮','亨，君子有終。',

[16,'雷地豫','震','坤','利建侯行師。',
 ['鳴豫，凶。','介于石，不終日，貞吉。','盱豫，悔。遲有悔。','由豫，大有得，勿疑，朋盍簪。','貞疾，恆不死。','冥豫，成有渝，无咎。']],
[17,'澤雷隨','兌','震','元亨，利貞，无咎。',

const HEXAGRAMS = RAW.map(r=>({
  number:r[0], name:r[1], upper:r[2], lower:r[3], guaci:r[4], yao:r[5], yong:r[6]||null
}));

const BY_KEY = {};
HEXAGRAMS.forEach(h=>{
  const bits=[...TRIGRAMS[h.lower], ...TRIGRAMS[h.upper]];
  h.bits=bits;
  BY_KEY[bits.join('')] = h;
});

  const div = document.createElement('div');

function lineLabel(pos, yang){
  if(pos===0) return yang? '初九':'初六';
  if(pos===5) return yang? '上九':'上六';
  const num=['','二','三','四','五'][pos];
  return yang? ('九'+num) : ('六'+num);
}

  dot.style.visibility = 'hidden';
  const introDurationMs = 4500;
  setTimeout(() => { dot.style.visibility = 'visible'; }, introDurationMs - 500);
  overlay.addEventListener('animationend', () => overlay.remove());
})();

function resetRows(){ hexLinesEl.innerHTML = ''; }

function addRow(pos, bit, moving){
  const bars = bit===1 ? '<div class="bar"></div>' : '<div class="bar"></div><div class="bar"></div>';
  const marker = moving ? '<span class="moving"></span>' : '<span class="no-move"></span>';
  const row = document.createElement('div');
  row.className = 'hexrow pop';
  row.innerHTML = `<span class="label">${POSITIONS[pos]}</span><div class="yao">${bars}</div>${marker}`;
  hexLinesEl.prepend(row);
}

castBtn.textContent = '擲第 1 爻';
const confirmRow = document.getElementById('confirmRow');
const confirmYes = document.getElementById('confirmYes');
const confirmNo = document.getElementById('confirmNo');

castBtn.addEventListener('click', () => {
  if(hasResult){
    castBtn.style.display = 'none';
    confirmRow.style.display = 'block';
    return;
  }
  tossOnce();
});

confirmNo.addEventListener('click', () => {
  confirmRow.style.display = 'none';
  castBtn.style.display = 'block';
});

confirmYes.addEventListener('click', () => {
  hasResult = false;
  resultCard.classList.remove('show');
  resetRows();
  questionEl.value = '';
  questionEl.disabled = false;
  castBtn.textContent = '擲第 1 爻';
  castHintEl.innerHTML = PROMPT_FIRST.replace(/\n/g, '<br>');
  progressEl.textContent = '';
  coinsEl.querySelectorAll('.coin').forEach(el=>{
    el.textContent = '－';
    el.classList.remove('yang','yin');
  });
  confirmRow.style.display = 'none';
  castBtn.style.display = 'block';
});

const castHintEl = document.getElementById('castHint');

function typewriterReveal(text, el, charDelay){
  return new Promise(resolve=>{
    el.textContent = '';
    let i = 0;
    (function step(){
      if(i < text.length){
        el.textContent += text[i];
        i++;
        setTimeout(step, charDelay);
      } else {
        resolve();
      }
    })();
  });
}

async function tossOnce(){
  if(castLines.length===0){
    resultCard.classList.remove('show');
    resetRows();
    currentQuestion = questionEl.value.trim();
    questionEl.disabled = true;
    setTimeout(() => {
      document.getElementById('inputCard').scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
  }

  const c1=tossCoin(), c2=tossCoin(), c3=tossCoin();
  const sum=c1+c2+c3;
  const yang = (sum===7 || sum===9);
  const moving = (sum===6 || sum===9);
  castLines.push({bit: yang?1:0, moving});

  coinsEl.querySelectorAll('.coin').forEach((el,idx)=>{
    const v=[c1,c2,c3][idx];
    el.textContent = v===3 ? '陽' : '陰';
    el.classList.remove('yang','yin');
    el.classList.add(v===3 ? 'yang' : 'yin');
    el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip');
  });

  const pos = castLines.length-1;
  addRow(pos, yang?1:0, moving);
  progressEl.textContent = `第 ${pos+1} / 6 爻・${POSITIONS[pos]}${moving?'（動）':''}`;

  const isLast = castLines.length === 6;
  const nextPromptText = isLast
    ? '六爻已成，靜下心看看卦象怎麼說。\n若要再起一卦，請寫下新的問題，再次按下按鈕即可。'
    : promptNext(castLines.length+1);

  if(!isLast){
    castBtn.disabled = true;
    await typewriterReveal(nextPromptText, castHintEl, 150);
    castBtn.disabled = false;
    castBtn.textContent = `擲第 ${castLines.length+1} 爻`;
  } else {
    castHintEl.textContent = nextPromptText;
    finishCast(castLines);
    castLines = [];
    hasResult = true;
    castBtn.textContent = '再起一卦';
  }
}

function finishCast(lines){
  const bits = lines.map(l=>l.bit);
  const key = bits.join('');
  const hex = BY_KEY[key];
  const hasMoving = lines.some(l=>l.moving);
  let zhiHex = null;
  if(hasMoving){
    const zhiBits = bits.map((b,idx)=> lines[idx].moving ? (1-b) : b);
    zhiHex = BY_KEY[zhiBits.join('')];
  }
  renderResult(hex, zhiHex, lines, currentQuestion);
  history.unshift({time:new Date(), hex, zhiHex, hasMoving, question: currentQuestion});
  renderHistory();
  progressEl.textContent = '';
  questionEl.disabled = false;
  questionEl.value = '';
  currentQuestion = '';
}

function renderResult(hex, zhiHex, lines, question){
  let html = '';
  if(question){
    html += `<p class="asked">所問：${escapeHtml(question)}</p>`;
  }
  if(zhiHex){
    html += `<div class="hex-compare">
      <div class="hex-arrow"><b>—</b>變之→</div>
      <div class="hex-col">
        <div class="col-num-name"><span class="col-gua-num">第${hex.number}卦</span><span class="col-gua-name">${hex.name}</span></div>
        <div class="col-label">本卦</div>
        <p class="col-gua-ci">${hex.guaci}</p>
      </div>
      <div class="hex-col zhi-col">
        <div class="col-num-name"><span class="col-gua-num">第${zhiHex.number}卦</span><span class="col-gua-name">${zhiHex.name}</span></div>
        <div class="col-label">之卦</div>
        <p class="col-gua-ci">${zhiHex.guaci}</p>
      </div>
    </div>`;
  } else {
    html += `<div class="hex-single">
      <div class="col-num-name"><span class="col-gua-num">第${hex.number}卦</span><span class="col-gua-name">${hex.name}</span></div>
      <p class="gua-ci-centered">${hex.guaci}</p>
    </div>`;
  }

  const movingLines = lines.map((l,idx)=>({...l, pos:idx})).filter(l=>l.moving);
  const movingSet = new Set(movingLines.map(l=>l.pos));

  html += `<div class="section-title">爻辭</div>`;
  for(let pos=0; pos<6; pos++){
    const label = lineLabel(pos, lines[pos].bit===1);
    const isMoving = movingSet.has(pos);
    html += `<div class="yao-ci-item${isMoving?' moving-line':''}"><b>${label}</b>${hex.yao[pos]}</div>`;
  }
  if(movingLines.length===6 && (hex.number===1 || hex.number===2)){
    const label = hex.number===1 ? '用九' : '用六';
    html += `<div class="yao-ci-item moving-line"><b>${label}</b>${hex.yong}</div>`;
  }
  if(movingLines.length===0){
    html += '<p class="no-change">六爻皆靜，以卦辭為斷。</p>';
  }

  resultCard.innerHTML = html;
  resultCard.classList.add('show');
}

function renderHistory(){
  if(history.length===0){ historyEl.innerHTML = '<p class="empty">尚無記錄</p>'; return; }
  historyEl.innerHTML = history.map(h=>{
    const t = h.time.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    const label = h.hasMoving ? `${h.hex.name} → ${h.zhiHex.name}` : h.hex.name;
    const q = h.question ? `<br><span style="font-size:12px;">${escapeHtml(h.question)}</span>` : '';
    return `<div class="hist-item"><span>${t}${q}</span><span>${label}</span></div>`;
  }).join('');
}
</script>
